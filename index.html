<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP MART 扭蛋星梦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #ff6b9d 0%, #c44fff 50%, #8b5cf6 100%); min-height: 100vh; overflow: hidden; }
        .scene { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .scene.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        .bubble { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.1); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <!-- 装饰泡泡 -->
    <div class="bubble" style="width: 50px; height: 50px; top: 10%; left: 10%; animation-delay: 0s;"></div>
    <div class="bubble" style="width: 30px; height: 30px; top: 20%; left: 80%; animation-delay: 0.5s;"></div>
    <div class="bubble" style="width: 40px; height: 40px; top: 60%; left: 15%; animation-delay: 1s;"></div>
    <div class="bubble" style="width: 25px; height: 25px; top: 40%; left: 90%; animation-delay: 1.5s;"></div>
    <div class="bubble" style="width: 60px; height: 60px; top: 80%; left: 70%; animation-delay: 2s;"></div>

    <!-- 首页欢迎场景 -->
    <div id="welcomeScene" class="scene active">
        <div style="text-align: center; padding-top: 120px;">
            <div style="animation: float 3s ease-in-out infinite;">
                <h1 style="font-size: 72px; color: white; text-shadow: 2px 2px 20px rgba(0,0,0,0.3); margin-bottom: 10px; font-weight: bold;">POP MART</h1>
                <h2 style="font-size: 42px; color: #ffe4ec; text-shadow: 1px 1px 10px rgba(0,0,0,0.2);">扭蛋星梦</h2>
            </div>
            <div style="margin-top: 60px;">
                <button id="startBtn" style="padding: 18px 70px; font-size: 28px; background: linear-gradient(45deg, #ff6b9d, #c44fff); color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 30px rgba(255, 107, 157, 0.5);">
                    🎮 开始游戏
                </button>
            </div>
            <p style="color: rgba(255,255,255,0.8); margin-top: 30px; font-size: 16px;">收集全部9款可爱手办</p>
        </div>

        <!-- 新手引导弹窗 -->
        <div id="guideModal" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 45px; border-radius: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.25); z-index: 100; display: block; max-width: 450px;">
            <div style="text-align: center; margin-bottom: 25px;">
                <div style="font-size: 50px; margin-bottom: 15px;">✨</div>
                <h3 style="color: #c44fff; font-size: 26px;">欢迎来到泡泡玛特扭蛋机！</h3>
            </div>
            <div style="margin-bottom: 25px;">
                <p style="color: #666; margin-bottom: 12px; line-height: 1.8; font-size: 16px;">🎁 <strong>点击扭蛋摇杆</strong>消耗1金币抽取手办</p>
                <p style="color: #666; margin-bottom: 12px; line-height: 1.8; font-size: 16px;">📚 <strong>收集全部9款</strong>可爱手办</p>
                <p style="color: #666; line-height: 1.8; font-size: 16px;">🖼️ <strong>在图鉴中</strong>查看已获得的手办</p>
            </div>
            <button id="closeGuide" style="display: block; margin: 0 auto; padding: 12px 50px; background: linear-gradient(45deg, #ff6b9d, #c44fff); color: white; border: none; border-radius: 30px; font-size: 18px; cursor: pointer;">
                知道了
            </button>
        </div>
    </div>

    <!-- 扭蛋机主交互场景 -->
    <div id="mainScene" class="scene">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 25px 40px; color: white;">
            <div style="font-size: 24px; display: flex; align-items: center;">
                <span style="margin-right: 8px;">💰</span>
                <span id="coinCount" style="color: #ffd700; font-weight: bold; font-size: 28px;">15</span>
                <span style="margin-left: 5px;">金币</span>
            </div>
            <button id="collectionBtn" style="padding: 12px 30px; background: rgba(255,255,255,0.25); color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; backdrop-filter: blur(10px);">
                🖼️ 查看图鉴
            </button>
        </div>

        <div style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 100px);">
            <!-- 扭蛋机主体 -->
            <div style="background: linear-gradient(180deg, #ffb6c1 0%, #ff69b4 100%); padding: 35px; border-radius: 35px; box-shadow: 0 25px 70px rgba(255, 105, 180, 0.45);">
                <!-- 扭蛋机顶部装饰 -->
                <div style="background: linear-gradient(180deg, #ff8fab 0%, #ff69b4 100%); height: 30px; border-radius: 20px 20px 0 0; margin: -35px -35px 0 -35px;"></div>
                
                <!-- 透明玻璃舱 -->
                <div style="background: rgba(255,255,255,0.35); padding: 25px; border-radius: 25px; margin-bottom: 20px; backdrop-filter: blur(5px); border: 3px solid rgba(255,255,255,0.5);">
                    <div id="eggContainer" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;">
                        <div class="egg" data-index="0"><img src="1.jpg" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;"></div>
                        <div class="egg" data-index="1"><img src="2.jpg" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;"></div>
                        <div class="egg" data-index="2"><img src="3.jpg" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;"></div>
                        <div class="egg" data-index="3"><img src="4.jpg" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;"></div>
                        <div class="egg" data-index="4"><img src="5.jpg" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;"></div>
                        <div class="egg" data-index="5"><img src="6.jpg" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;"></div>
                        <div class="egg" data-index="6"><img src="7.jpg" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;"></div>
                        <div class="egg" data-index="7"><img src="8.jpg" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;"></div>
                        <div class="egg" data-index="8"><img src="9.jpg" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;"></div>
                    </div>
                </div>
                <div style="text-align: center;">
                    <button id="leverBtn" style="width: 80px; height: 120px; background: linear-gradient(180deg, #ff8c00 0%, #ff4500 100%); border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4);">
                        <div style="width: 50px; height: 50px; background: white; border-radius: 50%; margin: 10px auto 0; display: flex; justify-content: center; align-items: center; font-size: 24px;">🎰</div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 藏品展示场景 -->
    <div id="collectionScene" class="scene">
        <div style="padding: 25px;">
            <button id="backBtn" style="padding: 12px 30px; background: rgba(255,255,255,0.25); color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; backdrop-filter: blur(10px);">
                ← 返回扭蛋机
            </button>
            <h2 style="color: white; text-align: center; margin: 35px 0; font-size: 36px;">我的藏品</h2>
            <div id="collectionGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; max-width: 650px; margin: 0 auto;">
                <div class="collection-item" data-index="0"><img src="1.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 20px;"><p style="color: white; text-align: center; margin-top: 12px; font-size: 16px;">繁花皇冠金发女孩</p></div>
                <div class="collection-item" data-index="1"><img src="2.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 20px;"><p style="color: white; text-align: center; margin-top: 12px; font-size: 16px;">棕色委屈哭哭小熊</p></div>
                <div class="collection-item" data-index="2"><img src="3.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 20px;"><p style="color: white; text-align: center; margin-top: 12px; font-size: 16px;">金属头盔机械少年</p></div>
                <div class="collection-item" data-index="3"><img src="4.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 20px;"><p style="color: white; text-align: center; margin-top: 12px; font-size: 16px;">粉蓝深海蝴蝶少女</p></div>
                <div class="collection-item" data-index="4"><img src="5.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 20px;"><p style="color: white; text-align: center; margin-top: 12px; font-size: 16px;">巧克力曲奇小熊</p></div>
                <div class="collection-item" data-index="5"><img src="6.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 20px;"><p style="color: white; text-align: center; margin-top: 12px; font-size: 16px;">深蓝抱熊皇冠公主</p></div>
                <div class="collection-item" data-index="6"><img src="7.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 20px;"><p style="color: white; text-align: center; margin-top: 12px; font-size: 16px;">榛果贝雷帽女孩</p></div>
                <div class="collection-item" data-index="7"><img src="8.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 20px;"><p style="color: white; text-align: center; margin-top: 12px; font-size: 16px;">黄色星星毛绒太阳玩偶</p></div>
                <div class="collection-item" data-index="8"><img src="9.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 20px;"><p style="color: white; text-align: center; margin-top: 12px; font-size: 16px;">奶牛睡衣双马尾女孩</p></div>
            </div>
        </div>
    </div>

    <!-- 中奖弹窗场景 -->
    <div id="resultModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 200;">
        <div id="resultContent" style="background: white; padding: 50px; border-radius: 35px; text-align: center; animation: bounce 0.5s ease; max-width: 420px;">
            <div style="font-size: 60px; margin-bottom: 15px;">🎉</div>
            <h3 style="color: #c44fff; font-size: 32px; margin-bottom: 25px;">恭喜获得！</h3>
            <img id="resultImage" src="" style="width: 220px; height: 220px; object-fit: cover; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
            <p id="resultName" style="color: #333; font-size: 22px; margin-bottom: 30px; font-weight: 500;"></p>
            <button id="claimBtn" style="padding: 14px 60px; background: linear-gradient(45deg, #ff6b9d, #c44fff); color: white; border: none; border-radius: 35px; font-size: 20px; cursor: pointer; box-shadow: 0 8px 25px rgba(255, 107, 157, 0.45);">
                ✨ 收下藏品
            </button>
        </div>
    </div>

    <!-- 消息弹窗 -->
    <div id="messageModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: white; padding: 25px 50px; border-radius: 20px; z-index: 300; text-align: center;">
        <div style="font-size: 40px; margin-bottom: 10px;">😢</div>
        <p style="font-size: 18px;">金币不足！</p>
    </div>

    <script>
        // 手办数据
        var hand办Names = [
            "繁花皇冠金发女孩",
            "棕色委屈哭哭小熊", 
            "金属头盔机械少年",
            "粉蓝深海蝴蝶少女",
            "巧克力曲奇小熊",
            "深蓝抱熊皇冠公主",
            "榛果贝雷帽女孩",
            "黄色星星毛绒太阳玩偶",
            "奶牛睡衣双马尾女孩"
        ];
        
        var hand办Images = [
            "1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", 
            "6.jpg", "7.jpg", "8.jpg", "9.jpg"
        ];

        var coins = 15;
        var collected = new Array(9).fill(false);
        var isSpinning = false;

        function showScene(sceneName) {
            document.querySelectorAll(".scene").forEach(function(scene) { 
                scene.classList.remove("active"); 
            });
            document.getElementById(sceneName + "Scene").classList.add("active");
        }

        document.getElementById("closeGuide").addEventListener("click", function() {
            document.getElementById("guideModal").style.display = "none";
        });

        document.getElementById("startBtn").addEventListener("click", function() {
            showScene("main");
        });

        document.getElementById("collectionBtn").addEventListener("click", function() {
            updateCollection();
            showScene("collection");
        });

        document.getElementById("backBtn").addEventListener("click", function() {
            showScene("main");
        });

        document.getElementById("leverBtn").addEventListener("click", function() {
            if (isSpinning) return;
            if (coins <= 0) {
                showMessage("金币不足！");
                return;
            }

            isSpinning = true;
            coins--;
            document.getElementById("coinCount").textContent = coins;

            var lever = document.getElementById("leverBtn");
            var eggContainer = document.getElementById("eggContainer");
            
            lever.style.transform = "rotate(-30deg)";
            eggContainer.style.animation = "spin 2.5s linear";

            setTimeout(function() {
                lever.style.transform = "rotate(0deg)";
                eggContainer.style.animation = "";
                isSpinning = false;

                var randomIndex = Math.floor(Math.random() * 9);
                document.getElementById("resultImage").src = hand办Images[randomIndex];
                document.getElementById("resultName").textContent = hand办Names[randomIndex];
                document.getElementById("resultModal").style.display = "flex";
            }, 2500);
        });

        document.getElementById("claimBtn").addEventListener("click", function() {
            var src = document.getElementById("resultImage").src;
            var imageName = src.substring(src.lastIndexOf("/") + 1);
            var index = hand办Images.indexOf(imageName);
            if (index !== -1) {
                collected[index] = true;
            }
            document.getElementById("resultModal").style.display = "none";
        });

        function updateCollection() {
            var items = document.querySelectorAll(".collection-item");
            items.forEach(function(item, index) {
                if (collected[index]) {
                    item.style.opacity = "1";
                    item.style.filter = "none";
                } else {
                    item.style.opacity = "0.35";
                    item.style.filter = "grayscale(100%)";
                }
            });
        }

        function showMessage(msg) {
            var modal = document.getElementById("messageModal");
            modal.querySelector("p").textContent = msg;
            modal.style.display = "block";
            setTimeout(function() { 
                modal.style.display = "none"; 
            }, 2000);
        }
    </script>
</body>
</html>
